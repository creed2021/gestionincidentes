_schema-version: 3.3.0
ID: incident-management
description: A simple CAP project.
version: 1.0.0
modules:
  - name: incident-management-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: incident-management-auth
      - name: incident-management-db
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: incident-management-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: incident-management-db
    parameters:
      buildpack: nodejs_buildpack
  - name: incident-management-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: incident-management-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - nsincidentes.zip
          name: nsincidentes
          target-path: resources/
  - name: nsincidentes
    type: html5
    path: app/incidentes
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: incident-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: incident-management-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: incident-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: incident-management-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: incident-management-html5-service
      service-plan: app-host
  - name: incident-management-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: incident-management-destination-service
      service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
